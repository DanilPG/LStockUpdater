{% extends "base.html" %}

{% block title %}Ошибка {{ error_code }} - LStock Updater{% endblock %}

{% block content %}
<div class="container" style="min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <div class="card" style="width: 100%; max-width: 400px; text-align: center;">
        <div style="font-size: 5rem; margin-bottom: 20px;">
            😕
        </div>
        
        <h1 style="font-size: 3rem; color: var(--danger); margin-bottom: 10px;">
            {{ error_code }}
        </h1>
        
        <p style="font-size: 1.2rem; color: var(--gray); margin-bottom: 30px;">
            {{ error_message }}
        </p>
        
        <a href="{{ url_for('dashboard') }}" class="btn btn-primary">
            🏠 На главную
        </a>
    </div>
</div>

<style>
    .container {
        padding: 20px;
    }
</style>
{% endblock %}
