{% extends "base.html" %}

{% block title %}Вход - LStock Updater{% endblock %}

{% block content %}
<div class="container" style="min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <div class="card" style="width: 100%; max-width: 400px;">
        <div class="card-header" style="justify-content: center; border-bottom: none;">
            <h1 class="card-title" style="text-align: center; font-size: 1.8rem; color: var(--primary);">
                📦 LStock Updater
            </h1>
        </div>
        
        <p style="text-align: center; color: var(--gray); margin-bottom: 30px;">
            Управление остатками на маркетплейсах
        </p>
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label class="form-label" for="username">Имя пользователя</label>
                <input 
                    type="text" 
                    class="form-control" 
                    id="username" 
                    name="username" 
                    placeholder="Введите имя пользователя"
                    required
                    autocomplete="username"
                    autofocus
                >
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Пароль</label>
                <input 
                    type="password" 
                    class="form-control" 
                    id="password" 
                    name="password" 
                    placeholder="Введите пароль"
                    required
                    autocomplete="current-password"
                >
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">
                Войти
            </button>
        </form>
        
        <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
            <p style="text-align: center; color: var(--gray); font-size: 0.9rem;">
                🔒 Защищенное соединение
            </p>
            <p style="text-align: center; color: var(--gray); font-size: 0.8rem; margin-top: 10px;">
                Все данные защищены и хранятся локально
            </p>
        </div>
    </div>
</div>

<style>
    .container {
        padding: 20px;
    }
    
    @media (max-width: 480px) {
        .card {
            padding: 20px 15px;
        }
    }
</style>

<script>
    // Автофокус на поле ввода
    document.addEventListener('DOMContentLoaded', function() {
        const usernameInput = document.getElementById('username');
        if (usernameInput) {
            usernameInput.focus();
        }
    });
    
    // Обработка отправки формы
    document.querySelector('form').addEventListener('submit', function(e) {
        const submitBtn = this.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="loading"></span> Вход...';
    });
</script>
{% endblock %}
